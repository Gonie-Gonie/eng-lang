name: EngLang Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing release tag to build, for example v0.1-preview"
        required: true
        type: string

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - name: Run repo-local setup
        shell: cmd
        run: .\dev.bat setup

      - name: Run release gate
        shell: cmd
        run: .\dev.bat release-check

      - name: Prepare release notes
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build | Out-Null
          $tag = "${env:RELEASE_TAG}"
          $candidateNotes = @((Join-Path "docs\release" "$tag.md"))
          $notesPath = $candidateNotes | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if ($notesPath) {
            Copy-Item -LiteralPath $notesPath -Destination "build\release-notes.md" -Force
          }
          else {
            Set-Content -Path "build\release-notes.md" -Encoding utf8 -Value @"
          # EngLang $tag

          Release notes were not found for $tag.

          Artifacts:
          - Windows portable zip
          - SHA256 checksum
          "@
          }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: englang-windows-${{ env.RELEASE_TAG }}
          path: |
            dist/englang-preview-v*-windows-x64.zip
            dist/englang-preview-v*-windows-x64.zip.sha256
            dist/englang-user-test-guide-v*.pdf
            dist/release-manifest.txt
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: EngLang ${{ env.RELEASE_TAG }}
          body_path: build/release-notes.md
          files: |
            dist/englang-preview-v*-windows-x64.zip
            dist/englang-preview-v*-windows-x64.zip.sha256
            dist/englang-user-test-guide-v*.pdf
            dist/release-manifest.txt
          fail_on_unmatched_files: true
          prerelease: ${{ contains(env.RELEASE_TAG, 'alpha') || contains(env.RELEASE_TAG, 'preview') || contains(env.RELEASE_TAG, 'beta') }}
