# EngLang native workflow module registry.
#
# This file is the machine-readable source for stdlib module status. The
# matching prose lives in stdlib/README.md and docs/current/workflow_modules.md.

[module."eng.path"]
status = "supported"
backing = "compiler_runtime_builtin"
purpose = "Typed path helpers, joins, names, and review-visible existence checks."
artifacts = ["review.inputs", "review.environment_dependencies"]
diagnostics = ["E-PATH-INVALID", "E-PATH-TRAVERSAL", "E-PATH-OUTSIDE-OUTPUT-ROOT"]
examples = ["examples/official/10_path_policy"]
tests = ["cargo test -p eng_compiler path_policy"]
symbols = ["file(path: String) -> FilePath", "dir(path: String) -> DirectoryPath", "join(base: DirectoryPath, child: String) -> FilePath | DirectoryPath", "parent(path: FilePath) -> DirectoryPath", "stem(path: FilePath) -> String", "extension(path: FilePath) -> String", "exists(path: FilePath | DirectoryPath) -> Bool"]

